<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A35E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f8f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="50" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1050" cy="350" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="600" cy="400" r="150" fill="rgba(255,255,255,0.06)"/>

  <!-- Parking sign icon -->
  <g transform="translate(900, 80)">
    <!-- Sign background -->
    <rect x="0" y="0" width="200" height="240" rx="8" fill="white"/>
    <!-- P letter -->
    <text x="100" y="100" font-size="80" font-weight="bold" fill="#1A35E6" text-anchor="middle" font-family="Arial, sans-serif">P</text>
    <!-- Line -->
    <line x1="20" y1="130" x2="180" y2="130" stroke="#1A35E6" stroke-width="3"/>
    <!-- Text -->
    <text x="100" y="200" font-size="14" font-weight="bold" fill="#1A35E6" text-anchor="middle" font-family="Arial, sans-serif">PARKING</text>
  </g>

  <!-- Main heading -->
  <text x="100" y="140" font-size="56" font-weight="bold" fill="white" font-family="Arial, sans-serif">5 Parking</text>
  <text x="100" y="210" font-size="56" font-weight="bold" fill="white" font-family="Arial, sans-serif">Mistakes to Avoid</text>

  <!-- Subheading -->
  <text x="100" y="290" font-size="20" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">Common parking errors and how the Curb app prevents them</text>

  <!-- Accent line -->
  <line x1="100" y1="320" x2="300" y2="320" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
</svg>