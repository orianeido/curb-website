<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A35E6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="400" fill="url(#bgGradient2)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="100" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="300" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="600" cy="-50" r="150" fill="rgba(255,255,255,0.06)"/>

  <!-- Globe/world icon -->
  <g transform="translate(850, 60)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="65" fill="rgba(255,255,255,0.1)"/>
    <!-- Continents simplified -->
    <path d="M -30 -20 Q -20 -10 -10 -20 Q 0 -25 10 -15 L 20 -10 Q 15 0 10 10 L -5 15 Q -20 10 -25 -5 Z" fill="rgba(255,255,255,0.3)"/>
    <path d="M -40 10 Q -35 20 -20 25 Q -10 20 -5 25 L 0 30 Q -5 25 -10 20 Z" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Main heading -->
  <text x="100" y="140" font-size="48" font-weight="bold" fill="white" font-family="Arial, sans-serif">Curb Launches</text>
  <text x="100" y="210" font-size="48" font-weight="bold" fill="white" font-family="Arial, sans-serif">Worldwide</text>

  <!-- Subheading -->
  <text x="100" y="290" font-size="20" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">Now available in 11 countries. Smart parking, everywhere.</text>

  <!-- Accent elements -->
  <line x1="100" y1="320" x2="320" y2="320" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

  <!-- Small badges -->
  <g transform="translate(800, 280)">
    <rect x="0" y="0" width="60" height="30" rx="4" fill="rgba(255,255,255,0.15)"/>
    <text x="30" y="20" font-size="12" fill="white" text-anchor="middle" font-family="Arial, sans-serif">NEW</text>
  </g>
</svg>