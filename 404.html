<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Curb</title>
  <meta name="description" content="Page not found — Curb" />
  <meta name="theme-color" content="#1A35E6" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .error-page {
      min-height: calc(100vh - 120px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 56px;
      padding-top: 150px;
      overflow: hidden;
    }

    .error-copy {
      max-width: 650px;
    }

    .error-copy h1 {
      font-size: clamp(64px, 8vw, 118px);
      line-height: .9;
      letter-spacing: -.078em;
      margin-bottom: 24px;
      letter-spacing: -0.050em;
    }

    .error-copy p:not(.eyebrow) {
      max-width: 560px;
      font-size: clamp(19px, 2vw, 25px);
      line-height: 1.35;
      color: rgba(255,255,255,.82);
      margin-bottom: 34px;
    }

    .error-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .error-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .error-visual::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.14), transparent 70%);
      filter: blur(12px);
    }

    .error-sign-img {
      width: min(520px, 90vw);
      max-height: 680px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 34px 80px rgba(0,0,0,.32));
      animation: signFloat 6s ease-in-out infinite;
    }

    @keyframes signFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }

    @media (max-width: 900px) {
      .error-page {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .error-copy,
      .error-copy p:not(.eyebrow) {
        margin-left: auto;
        margin-right: auto;
      }

      .error-actions {
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .error-page {
        padding-top: 110px;
      }

      .error-sign-img {
        width: min(340px, 90vw);
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a class="brand" href="index.html#top" aria-label="Curb home">curb</a>
    <nav class="nav">
      <a href="index.html#how">How it works</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#coverage">Coverage</a>
      <a href="index.html#about">About</a>
      <a href="index.html#faq">FAQ</a>
      <a href="blog/">Blog</a>
      <a href="https://apps.apple.com/us/app/curb-park/id6769830099" class="app-store-badge nav-app-store" target="_blank" rel="noopener">
        <img src="images/Download_on_the_App_Store_Badge_US-UK_RGB_wht_092917.svg" alt="Download on the App Store" />
      </a>
    </nav>
  </header>

  <main>
    <section class="error-page section">
      <div class="error-copy reveal visible">
        <p class="eyebrow">Parking Error</p>
        <h1>Wrong turn.</h1>
        <p>Looks like this page is parked somewhere else. Let’s get you back to the right curb.</p>

        <div class="error-actions">
          <a class="button button-primary" href="index.html">Back to home</a>
          <a class="app-store-badge" href="https://apps.apple.com/us/app/curb-park/id6769830099" target="_blank" rel="noopener">
            <img src="images/Download_on_the_App_Store_Badge_US-UK_RGB_wht_092917.svg" alt="Download on the App Store" />
          </a>
        </div>
      </div>

      <div class="error-visual reveal visible">
        <img src="images/404.webp" alt="404 parking sign — page not found" class="error-sign-img" />
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <strong>curb</strong>
      <span>Scan & Park</span>
    </div>

    <nav class="footer-links" aria-label="Footer links">
      <a href="index.html#faq">FAQ</a>
      <a href="blog/">Blog</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="mailto:support@curb-park.app">Contact</a>
    </nav>
  </footer>
</body>
</html>
